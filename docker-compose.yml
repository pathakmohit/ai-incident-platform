version: "3.9"

services:
  # ─── Frontend (Nginx serving static HTML/CSS/JS) ───────────────────────────
  frontend:
    image: nginx:alpine
    container_name: ai-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - ai-network
    restart: unless-stopped

  # ─── Backend (Node.js / Express API) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-incidents_db}
      - PYTHON_ENGINE_URL=http://python-engine:8000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ai-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # ─── Python AI Engine (Flask) ───────────────────────────────────────────────
  python-engine:
    build:
      context: ./python-engine
      dockerfile: Dockerfile
    container_name: ai-python-engine
    ports:
      - "8000:8000"
    networks:
      - ai-network
    restart: unless-stopped

  # ─── MySQL (local dev; replace with RDS in production) ─────────────────────
  mysql:
    image: mysql:8.0
    container_name: ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: incidents_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/utils/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge

volumes:
  mysql-data:
